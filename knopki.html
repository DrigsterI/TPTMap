<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>

<body>
    <div class="btn-toolbar" role="toolbar" aria-label="Toolbar with button groups">
        <div id="Floor" class="btn-group me-2" role="group" aria-label="First group">
            <button id="1" type="button" class="btn btn-primary" onclick="change(this)" disabled>1</button>
            <button id="2" type="button" class="btn btn-primary" onclick="change(this)">2</button>
            <button id="3" type="button" class="btn btn-primary" onclick="change(this)">3</button>
            <button id="4" type="button" class="btn btn-primary" onclick="change(this)">4</button>
            <button id="5" type="button" class="btn btn-primary" onclick="change(this)">5</button>
        </div>
        <div id="Building" class="btn-group me-2" role="group" aria-label="Second group">
            <button id="A" type="button" class="btn btn-primary" onclick="change(this)">A</button>
            <button id="B" type="button" class="btn btn-primary" onclick="change(this)" disabled>B</button>
        </div>
    </div>
    <div>
        <img id="imageDisplay" src="images/A/img1.jpg" class="img-fluid" width="1000px" height="1000px" alt="...">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
<script type="text/javascript">
    building="A";
    function change(clicked) {
        
        floorButtons = document.getElementById("Floor").children
        childrenAmount =document.getElementById("Floor").children.length
        for(let i = 0;i<childrenAmount;i++){
            
            floorButtons[i].disabled = false
        }
        image = document.getElementById("imageDisplay");
        if (clicked.parentNode.id == "Floor") {
            clicked.disabled =true;
            if(building == "A"){
                image.src = "images/A/img" + clicked.id + ".jpg";
            }else if(building =="B"){
                image.src = "images/B/img" + clicked.id + ".jpg";
            }
            
        }else if (clicked.parentNode.id=="Building"){
            
            building = clicked.id;
            image.src = "images/"+building+"/img1.jpg";
            floorButtons[0].disabled=true
            aBuilding = document.getElementById('A')
            bBuilding = document.getElementById('B')
            if(building=="A"){

                aBuilding.disabled = true;
                bBuilding.disabled = false;
            }
            else{
                bBuilding.disabled=true;
                aBuilding.disabled = false;
            }
        }


    }
</script>
